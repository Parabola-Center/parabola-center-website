---
layout: base
---
<h1 class="section-band">{{media.header}}</h1>

<section class="media-section">
  <div class="media-grid">
    {% for item in media.items %}
    <a class="media-card" href="{{ item.url }}" target="_blank" rel="noopener">
      <p class="media-meta">{{ item.outlet }}{% if item.outlet and item.date %} &middot; {% endif %}{{ item.date }}</p>
      <h3 class="media-title">{{ item.title }}</h3>
      <span class="media-link">Read &rarr;</span>
    </a>
    {% endfor %}
  </div>
</section>

<section class="media-inquiries">
  {{ media.contact | markdown | safe }}
</section>
